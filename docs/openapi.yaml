          type: integer
        font_family:
          type: string
        margin_size:
          type: string
        sleep_timer:
          type: integer
        spread:
          type: boolean
        theme:
          type: string

    BookSettingsResponse:
      type: object
      required:
        - audio_speed
        - font_size
        - font_family
        - margin_size
        - sleep_timer
        - spread
        - theme
      properties:
        audio_speed:
          type: number
          format: float
        font_size:
          type: integer
        font_family:
          type: string
        margin_size:
          type: string
        sleep_timer:
          type: integer
        spread:
          type: boolean
        theme:
          type: string

    ProductMappingMetadataResponse:
      type: object
      required:
        - id
        - synched_at
        - mapping_file_size
        - signed_url
      properties:
        id:
          type: integer
        synched_at:
          type: integer
          format: int64
        mapping_file_size:
          type: integer
        signed_url:
          type: string

    AudioFileResponse:
      type: object
      required:
        - idref
        - start_at
        - end_at
        - duration
        - uri
      properties:
        idref:
          type: string
          description: Audio file identifier
        title:
          type: string
          nullable: true
          description: Audio file title
        file_id:
          type: string
          nullable: true
          description: File ID
        start_at:
          type: integer
          description: Start time in milliseconds
        end_at:
          type: integer
          description: End time in milliseconds
        duration:
          type: integer
          description: Duration in milliseconds
        uri:
          type: string
          description: Audio file URL

    AudioCryptKeyResponse:
      type: object
      required:
        - key
        - url
      properties:
        key:
          type: string
          description: Encryption key
        url:
          type: string
          description: Key URL

    AudioPackageResponse:
      type: object
      required:
        - duration
        - files
      properties:
        duration:
          type: integer
        files:
          type: array
          items:
            $ref: '#/components/schemas/AudioFileResponse'
        crypt_keys:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AudioCryptKeyResponse'
        sliced_at:
          type: string
          format: date-time
          nullable: true

    ReviewsPageResponse:
      type: object
      required:
        - comments
      properties:
        comments:
          type: array
          items:
            $ref: '#/components/schemas/ReviewResponse'

    QuestionResponse:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: array
          items:
            type: string

    ValueResponse:
      type: object
      required:
        - count
        - selected
        - text
      properties:
        count:
          type: integer
          description: Number of items with this value
        display_name:
          type: string
          nullable: true
          description: Display name for the value
        id:
          type: integer
          nullable: true
          description: Value identifier
        selected:
          type: boolean
          description: Whether this value is selected
        text:
          type: string
          description: Value text

    RangeResponse:
      type: object
      required:
        - max
        - max_selected
        - min
        - min_selected
      properties:
        max:
          type: string
          description: Maximum value
        max_selected:
          type: string
          description: Maximum selected value
        min:
          type: string
          description: Minimum value
        min_selected:
          type: string
          description: Minimum selected value

    FacetResponse:
      type: object
      required:
        - attribute
        - is_range
      properties:
        attribute:
          type: string
        is_range:
          type: boolean
        primary_facet:
          type: boolean
          nullable: true
        range:
          allOf:
            - $ref: '#/components/schemas/RangeResponse'
          nullable: true
        values:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ValueResponse'

    TrendingSearchEntry:
      type: object
      required:
        - text
      properties:
        text:
          type: string

    ThemeProductSelectionResponse:
      type: object
      required:
        - id
        - title
        - show_filter
        - sort_fields
      properties:
        id:
          type: integer
          description: Selection ID
        title:
          type: string
          description: Selection title
        color:
          type: string
          nullable: true
          description: Theme color
        show_filter:
          type: boolean
          description: Whether to show filter
        sort_fields:
          type: array
          items:
            $ref: '#/components/schemas/SortFieldResponse'
          description: Available sort fields

    ThemeCollectionResponse:
      type: object
      required:
        - id
        - title
        - image
        - products_count
        - show_filter
        - sort_fields
        - children
      properties:
        id:
          type: integer
        title:
          type: string
        image:
          type: string
        color:
          type: string
          nullable: true
        products_count:
          type: integer
        show_filter:
          type: boolean
        sort_fields:
          type: array
          items:
            $ref: '#/components/schemas/SortFieldResponse'
        children:
          type: array
          items:
            $ref: '#/components/schemas/ThemeProductSelectionResponse'

    ReportClickRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: integer

    OjdResponse:
      type: object
      required:
        - reporting_data
      properties:
        reporting_data:
          type: object
          required:
            - ojd_link
          properties:
            ojd_link:
              type: string
              nullable: true
              description: OJD reporting link

    FollowingListsResponse:
      type: object
      required:
        - selections
      properties:
        selections:
          type: array
          items:
            $ref: '#/components/schemas/LibraryListResponse'

    ReviewResponse:
      type: object
      required:
        - created_at
        - id
        - pseudo
        - rating
        - text
      properties:
        created_at:
          type: string
        id:
          type: string
        pseudo:
          type: string
        rating:
          type: number
          format: float
        text:
          type: string

    RatingsResponse:
      type: object
      required:
        - group_rating
        - number_of_reviews
        - number_of_rates
        - avg_rate
        - user_rate
      properties:
        group_rating:
          type: object
          additionalProperties:
            type: number
            format: float
          description: Map of rating groups to their values
        number_of_reviews:
          type: integer
        number_of_rates:
          type: integer
        avg_rate:
          type: number
          format: float
        user_rate:
          type: number
          format: float

    ProductCategoriesResponse:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            type: object
            required:
              - id
              - title
              - sub_categories
              - sort_fields
            properties:
              id:
                type: integer
              title:
                type: string
              sub_categories:
                type: array
                items:
                  type: object
                  description: Nested Category (recursive)
              show_filter:
                type: boolean
                nullable: true
              sort_fields:
                type: array
                items:
                  $ref: '#/components/schemas/SortFieldResponse'

