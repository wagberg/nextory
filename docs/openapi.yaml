openapi: 3.0.3
info:
  title: Nextory API
  description: |
    Nextory Android app API (com.gtl.nextory) for audiobooks and ebooks.
    Derived from decompiled Android app code and network traffic analysis.

    ## Retrofit Interface Mapping (decompiled source)

    The Android app uses Retrofit with obfuscated class names. Key interfaces:
    - **bb8.java** - Library: product lists, add/remove from library
    - **kqd.java** - Search: book search, autocomplete, editorial entries
    - **lcb.java** - Person details: author/{id}, narrator/{id}
    - **xob.java** - Products: details, browse by path, recommendations, comments
    - **ti0.java** - Audio reader: audio packages
    - **at1.java** - Reading position: get/update position
    - **ti2.java** - Categories: list, details, onboarding
    - **o5e.java** - Series: popular, details, by category
    - **g29.java** - Series products
    - **zw6.java** - Home: home_entries (recommendations)
    - **zzb.java** - Profiles: list, create, authorize, preferences
    - **vw8.java** - Auth: sessions (login/logout), registration
    - **vv1.java** - Bookmarks: CRUD
    - **ju1.java** - Reader settings
    - **ubg.java** - Usage blocks (analytics)
    - **gbf.java** - Subscription info, account deletion
    - **y7.java** - Account: get/update, notifications
    - **wqc.java** - Reading diary: stats, activity feed
    - **pj.java** - AI librarian sessions
    - **cn5.java** - Reviews
    - **sj5.java** - Facets (search filters)
    - **psb.java** - Product sync

    ## HTTP Method Annotations (Retrofit, obfuscated by ProGuard/R8)
    - @mh6 = @GET
    - @p2b = @POST
    - @k2b = @PATCH
    - @yx3 = @PUT
    - @xq6 = @HTTP (generic, method specified in annotation e.g. method = "DELETE")

    ## Important Notes
    - Library product listing endpoints use POST (not GET) with a body containing
      downloaded product IDs to filter. This is a read operation despite the method.
    - @ApplyGlobalFilters annotation means profile-level content filters are applied server-side.
    - @ihc Map<String, String> parameters are additional query params passed as a map.
  version: 2026.04.1
  contact:
    name: Nextory
    url: https://www.nextory.com

servers:
  - url: https://api.nextory.com
    description: Production server

security:
  - DeviceAuth: []
  - ProfileAuth: []

components:
  securitySchemes:
    DeviceAuth:
      type: apiKey
      in: header
      name: X-Login-Token
      description: User authentication token (required when authenticated)
    
    ProfileAuth:
      type: apiKey
      in: header
      name: X-Profile-Token
      description: Active profile token (required for most endpoints except @c5f marked)

  parameters:
    X-Application-Id:
      name: X-Application-Id
      in: header
      required: true
      schema:
        type: string
        enum: ["200", "201", "202", "204", "205"]
      description: Device type (200=Android, 201=iOS, 202=Huawei, 204=Automotive, 205=Wear)
    
    X-Device-Id:
      name: X-Device-id
      in: header
      required: true
      schema:
        type: string
        format: uuid
        pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-3[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      example: "550e8400-e29b-31d4-a716-446655440000"
      description: |
        Device identifier as UUID v3 (namespace-based UUID).
        Generated using uuid3(NAMESPACE_DNS, "python-nextory").
        Must be a valid UUID v3 format (version field = 3).
    
    X-Locale:
      name: X-Locale
      in: header
      required: true
      schema:
        type: string
        pattern: '^[a-z]{2}_[A-Z]{2}$'
      example: en_US
      description: Device locale (language_country)
    
    X-Model:
      name: X-Model
      in: header
      required: true
      schema:
        type: string
      example: Samsung%20SM-G991B
      description: URL-encoded device model
    
    X-App-Version:
      name: X-App-Version
      in: header
      required: true
      schema:
        type: string
        default: "2026.01.3"
      description: App version
    
    X-Os-Info:
      name: X-Os-Info
      in: header
      required: true
      schema:
        type: string
        pattern: '^Android \d+$'
      example: Android 13
      description: Android OS version
    
    X-Country-Code:
      name: X-Country-Code
      in: header
      required: true
      schema:
        type: string
        pattern: '^[A-Z]{2}$'
      example: US
      description: ISO 3166-1 alpha-2 country code

  responses:
    Unauthorized:
      description: Not authorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NetworkErrorResponse'
          example:
            error:
              code: 7111
              key: Unauthorized
              message: Not Authorized
              description: Not Authorized

  schemas:
    ProductType:
      type: string
      enum:
        - book
        - magazine
      description: Type of product content

    FormatType:
      type: string
      enum:
        - epub
        - hls
        - pdf
      description: Format type for books (EPUB for ebooks, HLS for audiobooks, PDF for PDFs)

    NetworkErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
          properties:
            code:
              type: integer
              description: |
                Numeric error code. Known codes:
                - 7100: BookNotFound - Book/resource not found
                - 7111: Unauthorized - Not authorized to access resource
              example: 7111
            key:
              type: string
              nullable: true
              description: Error identifier key
              example: Unauthorized
            message:
              type: string
              nullable: true
              description: Human-readable error message
              example: Not Authorized
            description:
              type: string
              nullable: true
              description: Detailed error description
              example: Not Authorized
      example:
        error:
          code: 7100
          key: BookNotFound
          message: "Couldn't find Book with 'id'=9789129692389"
          description: "Couldn't find Book with 'id'=9789129692389"

    ProfileResponse:
      type: object
      required:
        - id
        - name
        - login_key
        - customer_id
        - is_main
        - filter
        - color_index
        - settings
        - is_magazine_enabled
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
          nullable: true
        login_key:
          type: string
        customer_id:
          type: integer
          format: int64
        is_main:
          type: boolean
        filter:
          type: string
        category:
          type: string
          nullable: true
        img_status:
          type: string
          nullable: true
        pic_url:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        color_index:
          type: integer
        settings:
          $ref: '#/components/schemas/ProfileSettings'
        is_magazine_enabled:
          type: boolean
        birth_year:
          type: integer
          nullable: true
        avatar:
          allOf:
            - $ref: '#/components/schemas/AvatarResponse'
          nullable: true

