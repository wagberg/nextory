        profile_product:
          $ref: '#/components/schemas/ProfileProductResponse'
        product_badges:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductBadgeResponse'
        is_format_synced:
          type: boolean
          nullable: true

    LibraryListResponse:
