          format: date-time
          nullable: true
        total_pages:
          type: integer
          nullable: true

    LibraryListsResponse:
      type: object
      properties:
        product_lists:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/LibraryListResponse'
        lists:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/LibraryListResponse'

    BookmarkResponse:
