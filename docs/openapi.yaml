  /library/v1/me/product_lists/{type}/products:
    post:
      summary: Get products from a library list
      description: |
        Fetch products from a specific library list type. Despite being a POST,
        this is the primary endpoint for retrieving audiobooks from the user's library.
        The request body contains IDs of already-downloaded products to exclude from results.
        Confirmed via decompiled Android app (bb8.java method n).
      tags:
        - Library
      security:
        - DeviceAuth: []
        - ProfileAuth: []
      parameters:
        - $ref: '#/components/parameters/X-Application-Id'
        - $ref: '#/components/parameters/X-Device-Id'
        - $ref: '#/components/parameters/X-Locale'
        - $ref: '#/components/parameters/X-Model'
        - $ref: '#/components/parameters/X-App-Version'
        - $ref: '#/components/parameters/X-Os-Info'
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum:
              - author
              - brand_subscription
              - completed
              - custom
              - downloaded
              - offline
              - ongoing
              - following
              - purchased
              - want_to_read
              - unknown
          description: |
            Product list type:
            - ongoing: Currently reading/listening
            - want_to_read: Books marked to read later
            - completed: Finished books
            - downloaded: Downloaded for offline
            - purchased: Purchased books
            - custom: User-created custom lists
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: List ID (obtained from GET /library/v1/me/library)
        - name: page
          in: query
          required: true
          schema:
            type: integer
            default: 0
        - name: per
          in: query
          required: true
          schema:
            type: integer
            default: 50
        - name: filter
          in: query
          required: true
          schema:
            type: string
            enum:
              - all
              - kids
              - teenagers
          description: Age-based content filter
        - name: filters
          in: query
          style: form
          explode: true
          schema:
            type: object
            additionalProperties:
              type: string
          description: Additional filter key-value pairs (e.g. content_type, format)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadedProductIdsToFilter'
      responses:
        '200':
          description: Product list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsPageResponse'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkErrorResponse'

