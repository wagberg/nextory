  /discovery/v1/search/products/books:
    get:
      summary: Search books
      description: |
        Search for books by text query. Returns paginated product results.
        Supports additional filters via query map (e.g. content_type, format).
        Confirmed via decompiled Android app (kqd.java method e).
        Has @ApplyGlobalFilters annotation (profile-level filters applied server-side).
      tags:
        - Search & Browse
      security:
        - DeviceAuth: []
        - ProfileAuth: []
      parameters:
        - $ref: '#/components/parameters/X-Application-Id'
        - $ref: '#/components/parameters/X-Device-Id'
        - $ref: '#/components/parameters/X-Locale'
        - $ref: '#/components/parameters/X-Model'
        - $ref: '#/components/parameters/X-App-Version'
        - $ref: '#/components/parameters/X-Os-Info'
        - name: search_phrase
          in: query
          required: true
          schema:
            type: string
          description: Search query text
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: per
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          schema:
            type: string
          description: Sort order
        - name: showupcoming
          in: query
          schema:
            type: boolean
          description: Include upcoming/unreleased titles
        - name: filters
          in: query
          style: form
          explode: true
          schema:
            type: object
            additionalProperties:
              type: string
          description: Additional filter key-value pairs
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsPageResponse'
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkErrorResponse'

