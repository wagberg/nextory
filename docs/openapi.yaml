          nullable: true
        offline_available:
          type: boolean
        editable:
          type: boolean
        deletable:
          type: boolean
        is_content_frozen:
          type: boolean
        type:
          type: string
        item_count:
          type: integer
          nullable: true
        book_count:
          type: integer
          nullable: true
        created_date:
          type: string
          format: date-time
        cover_images:
          type: array
